services:
  mongo:
    image: mongo:8.0
    container_name: go-api-auth-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go-api-auth-api
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      APP_NAME: Go Auth API
      APP_VERSION: 1.1.0
      HTTP_PORT: 8080
      ALLOWED_ORIGINS: "*"
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB_NAME: go_api
      MONGO_USER_COLLECTION: users
      JWT_SECRET: supersecretkey
      JWT_ISSUER: go_api_auth
    ports:
      - "8080:8080"

volumes:
  mongo_data:
